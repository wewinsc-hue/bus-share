const DEFAULT_AM=[];
const DEFAULT_PM=[];
function getEffectiveDay(key,store){
  const stored=store?.days?.[key];
  if(stored&&(stored.am.length>0||stored.pm.length>0||stored.in||stored.out||stored.fuel)) return stored;
  const [y,m,d]=key.split("-").map(Number);
  const dow=new Date(y,m-1,d).getDay();
  if(dow>=1&&dow<=5) return {am:[...DEFAULT_AM],pm:[...DEFAULT_PM],in:stored?.in||"",out:stored?.out||"",fuel:stored?.fuel||""};
  return stored||{am:[],pm:[],in:"",out:"",fuel:""};
}

const pad = (n)=>String(n).padStart(2,"0");
const ymd = (y,m,d)=>`${y}-${pad(m)}-${pad(d)}`;
const shortDate = (iso)=>{if(!iso)return"";const[y,m,d]=iso.split("-");return`${(y||"").slice(2)}.${m||""}.${d||""}`;};

function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function buildGrid(y,m){
  const off=new Date(y,m-1,1).getDay(),total=daysInMonth(y,m);
  const c=Array(off).fill(null);
  for(let d=1;d<=total;d++) c.push(d);
  while(c.length%7!==0) c.push(null);
  return c;
}

function makeDays(){
  const d={};
  Object.entries(SEED_DAYS).forEach(([k,v])=>{d[k]={am:v.am||[],pm:v.pm||[],in:"",out:"",fuel:""};});
  return d;
}
function makeSwissRev(){return Object.fromEntries([...PRICED_ROUTES,...(typeof EXTRA_ROUTES!=="undefined"?EXTRA_ROUTES:[])].map((r)=>[r,DEFAULT_PRICES[r]||0]));}
function makeSwissDed(){return Object.fromEntries(SWISS_DED_ITEMS.map((i)=>[i.key,i.default]));}

function initial(){
  return {days:makeDays(),prices:{...DEFAULT_PRICES},deductions:{...DEFAULT_DEDUCTIONS},waedae:{...DEFAULT_WAEDAE},swissRevenue:makeSwissRev(),customSwissRoutes:[],hiddenSwissRoutes:[],routeColors:{},customSwissDedItems:[],hiddenSwissDedKeys:[],swissDedOrder:[],customPriceRoutes:[],promotedRoutes:[],permaDeletedRoutes:[],tabOrder:[],tabLabels:{},charters:SEED_CHARTERS,swissDeductions:{},ledger:[],loans:SEED_LOANS};
}
function normalDay(d){
  if(!d) return {am:[],pm:[],in:"",out:"",fuel:""};
  if(Array.isArray(d.routes)) return {am:d.routes,pm:[],in:d.in||"",out:d.out||"",fuel:d.fuel||""};
  return {am:d.am||[],pm:d.pm||[],in:d.in||"",out:d.out||"",fuel:d.fuel||""};
}
function normalStore(s){
  const days={};
  Object.entries(s.days||{}).forEach(([k,d])=>{days[k]=normalDay(d);});
  return {days,prices:{...DEFAULT_PRICES,...(s.prices||{})},deductions:{...DEFAULT_DEDUCTIONS,...(s.deductions||{})},waedae:{...DEFAULT_WAEDAE,...(s.waedae||{})},swissRevenue:{...makeSwissRev(),...(s.swissRevenue||{})},customSwissRoutes:s.customSwissRoutes||[],hiddenSwissRoutes:s.hiddenSwissRoutes||[],routeColors:s.routeColors||{},customSwissDedItems:s.customSwissDedItems||[],hiddenSwissDedKeys:s.hiddenSwissDedKeys||[],swissDedOrder:s.swissDedOrder||[],charters:s.charters||[],swissDeductions:s.swissDeductions||{},ledger:s.ledger||[],loans:s.loans||SEED_LOANS,cardPayDays:s.cardPayDays||{},customPriceRoutes:s.customPriceRoutes||[],promotedRoutes:s.promotedRoutes||[],permaDeletedRoutes:s.permaDeletedRoutes||[],tabOrder:s.tabOrder||[],tabLabels:s.tabLabels||{},customCards:s.customCards||[]};
}

function App(){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth()+1);
  const [store,setStore]=useState(null);
  const [tab,setTab]=useState("calendar");
  const [saveState,setSaveState]=useState("idle");
  const [sel,setSel]=useState(null);
  const [dAm,setDAm]=useState([]);
  const [dPm,setDPm]=useState([]);
  const [dIn,setDIn]=useState("");
  const [dOut,setDOut]=useState("");
  const [dFuel,setDFuel]=useState("");
  const [cAm,setCAm]=useState("");
  const [cPm,setCPm]=useState("");
  const [memoInput,setMemoInput]=useState("");
  const [memoEdit,setMemoEdit]=useState(null);
  const [confirmPermaDelete,setConfirmPermaDelete]=useState(null);
  const [tabEditMode,setTabEditMode]=useState(false);
  const tabRowRefs=useRef({});
  const [dragTabKey,setDragTabKey]=useState(null);
  const [dragTabOrderKeys,setDragTabOrderKeys]=useState(null);
  const baseTabs=useMemo(()=>{
    const order=(store?.tabOrder||[]).length?store.tabOrder:TABS.map(t=>t.id);
    const byId=Object.fromEntries(TABS.map(t=>[t.id,t]));
    const ordered=order.map(id=>byId[id]).filter(Boolean);
    const rest=TABS.filter(t=>!order.includes(t.id));
    return [...ordered,...rest].map(t=>({...t,label:(store?.tabLabels||{})[t.id]||t.label}));
  },[store]);
  const displayTabs=useMemo(()=>{
    if(!dragTabOrderKeys) return baseTabs;
    const byId=Object.fromEntries(baseTabs.map(t=>[t.id,t]));
    return dragTabOrderKeys.map(id=>byId[id]).filter(Boolean);
  },[baseTabs,dragTabOrderKeys]);
  const startTabDrag=(e,id)=>{
    e.preventDefault();
    setDragTabKey(id);
    setDragTabOrderKeys(baseTabs.map(t=>t.id));
    e.target.setPointerCapture&&e.target.setPointerCapture(e.pointerId);
  };
  const onTabDragMove=(e)=>{
    if(!dragTabKey) return;
    const x=e.clientX;
    setDragTabOrderKeys((prev)=>{
      if(!prev) return prev;
      const keys=[...prev];
      const idx=keys.indexOf(dragTabKey);
      for(let i=0;i<keys.length;i++){
        if(i===idx) continue;
        const el=tabRowRefs.current[keys[i]];
        if(!el) continue;
        const rect=el.getBoundingClientRect();
        const mid=rect.left+rect.width/2;
        if((i<idx&&x<mid)||(i>idx&&x>mid)){
          keys.splice(idx,1);
          keys.splice(i,0,dragTabKey);
          return keys;
        }
      }
      return keys;
    });
  };
  const endTabDrag=()=>{
    if(dragTabKey&&dragTabOrderKeys) upd((p)=>({...p,tabOrder:dragTabOrderKeys}));
    setDragTabKey(null);
    setDragTabOrderKeys(null);
  };
  const renameTab=(id,label)=>upd((p)=>({...p,tabLabels:{...(p.tabLabels||{}),[id]:label}}));
  const [newEnt,setNewEnt]=useState({date:"",type:"expense",desc:"",amount:"",payMethod:"현금"});

  useEffect(()=>{
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      setStore(raw?normalStore(JSON.parse(raw)):initial());
    }catch(e){setStore(initial());}
  },[]);

  const persist=useCallback((next)=>{
    setSaveState("saving");
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify(next));
      setSaveState("saved");
      setTimeout(()=>setSaveState("idle"),1000);
    }catch(e){setSaveState("error");}
  },[]);

  const upd=(fn)=>setStore((p)=>{const n=fn(p);persist(n);return n;});
  const monthStr=mk(year,month);
  const grid=useMemo(()=>buildGrid(year,month),[year,month]);

  const goMonth=(d)=>{let m=month+d,y=year;if(m<1){m=12;y--;}if(m>12){m=1;y++;}setMonth(m);setYear(y);};

  // 달력 모달
  const openDay=(d)=>{
    if(!d||!store) return;
    const k=ymd(year,month,d),dd=getEffectiveDay(k,store);
    setSel(k);setDAm([...dd.am]);setDPm([...dd.pm]);setDIn(dd.in||"");setDOut(dd.out||"");setDFuel(dd.fuel||"");setCAm("");setCPm("");setMemoInput("");
  };
  const closeDay=()=>{setSel(null);setDAm([]);setDPm([]);setDFuel("");setMemoInput("");};
  const colorFor=(r)=>ROUTE_COLORS[r]||EXTRA_ROUTE_COLORS[r]||(store?.routeColors||{})[r]||EXTRA_COLOR;
  const ensureColor=(name)=>{
    if(!name||ROUTE_COLORS[name]||EXTRA_ROUTE_COLORS[name]||(store?.routeColors||{})[name]) return;
    const used=Object.values(store?.routeColors||{});
    const color=pickColor(used);
    upd((p)=>({...p,routeColors:{...(p.routeColors||{}),[name]:color}}));
  };
  const toggleRoutePromotion=(r)=>{
    if(PRICED_ROUTES.includes(r)) return; // 기본 고정 노선은 편입/복귀 대상이 아님
    ensureColor(r);
    upd((p)=>{
      const promoted=p.promotedRoutes||[];
      return promoted.includes(r)
        ?{...p,promotedRoutes:promoted.filter((x)=>x!==r)}
        :{...p,promotedRoutes:[...promoted,r]};
    });
  };
  const promoteCustomRoute=(cr)=>{
    if(!cr.name) return;
    ensureColor(cr.name);
    upd((p)=>({
      ...p,
      promotedRoutes:[...(p.promotedRoutes||[]),cr.name],
      prices:{...p.prices,[cr.name]:cr.price||0},
      deductions:{...p.deductions,[cr.name]:cr.deduction||0},
      customPriceRoutes:(p.customPriceRoutes||[]).filter((x)=>x.id!==cr.id)
    }));
  };
  const toggleR=(period,r)=>{const s=period==="am"?setDAm:setDPm;s((p)=>p.includes(r)?p.filter((x)=>x!==r):[...p,r]);ensureColor(r);};
  const addC=(period)=>{
    const v=(period==="am"?cAm:cPm).trim();
    if(!v) return;
    (period==="am"?setDAm:setDPm)((p)=>[...p,v]);
    period==="am"?setCAm(""):setCPm("");
    ensureColor(v);
  };
  const saveDay=()=>{
    upd((p)=>{const days={...p.days};const has=dAm.length||dPm.length||dIn||dOut||dFuel;if(has)days[sel]={am:dAm,pm:dPm,in:dIn,out:dOut,fuel:dFuel};else delete days[sel];return {...p,days};});
    closeDay();

  const clearDay=()=>{upd((p)=>{const days={...p.days};delete days[sel];return {...p,days};});closeDay();};

  // 통계
  const stats=useMemo(()=>{
    if(!store) return {counts:[],workedDays:0,byP:{}};
    const byP={};let w=0;

      const k=ymd(year,month,d);

      dd.am.forEach((r)=>{byP[r]=byP[r]||{am:0,pm:0};byP[r].am++;});

    const counts=Object.entries(byP).map(([r,c])=>[r,c.am+c.pm]).sort((a,b)=>b[1]-a[1]);
    return {counts,workedDays:w,byP};

  const income4route=useCallback((route,period)=>{
    if(!store) return 0;
    if(route==="외대") return period==="am"?(store.waedae.amIncome||0):(store.waedae.pmIncome||0);
    return Math.max(0,(store.prices[route]||0)-(store.deductions[route]||0));
  },[store]);

  // 스위스매출 합계
  const swissRevTotal=useMemo(()=>{
    if(!store) return 0;
    return PRICED_ROUTES.filter(r=>!(store.hiddenSwissRoutes||[]).includes(r)).reduce((s,r)=>{
      const cnt=(stats.byP[r]?.am||0)+(stats.byP[r]?.pm||0);
      return s+(store.swissRevenue[r]||0)*cnt;
    },0);
  },[store,stats]);

  // 주유비 합계
  const fuelTotal=useMemo(()=>{
    if(!store) return 0;
    return Object.entries(store.days).reduce((s,[k,d])=>k.startsWith(monthStr)?s+(Number(d.fuel)||0):s,0);
  },[store,monthStr]);

  // 스위스공제 이번달
  const swissDed=useMemo(()=>(store?.swissDeductions?.[monthStr])||makeSwissDed(),[store,monthStr]);
  const updSwissDed=(key,val)=>upd((p)=>({...p,swissDeductions:{...p.swissDeductions,[monthStr]:{...swissDed,[key]:val}}}));
  const swissDedTotal=useMemo(()=>{
    const builtIn=SWISS_DED_ITEMS.filter(i=>!(store?.hiddenSwissDedKeys||[]).includes(i.key)).reduce((s,i)=>s+(i.auto?fuelTotal:Number(swissDed[i.key]||0)),0);
    const custom=(store?.customSwissDedItems||[]).reduce((s,c)=>s+Number(swissDed["custom_"+c.id]||0),0);
    return builtIn+custom;
  },[swissDed,fuelTotal,store]);
  const dedItemsList=useMemo(()=>{
    if(!store) return [];
    const builtin=SWISS_DED_ITEMS.filter(i=>!(store.hiddenSwissDedKeys||[]).includes(i.key)).map(i=>({key:i.key,type:"builtin",item:i}));
    const custom=(store.customSwissDedItems||[]).map(c=>({key:"custom_"+c.id,type:"custom",item:c}));
    const all=[...builtin,...custom];
    const order=store.swissDedOrder||[];
    const ordered=order.map(k=>all.find(a=>a.key===k)).filter(Boolean);
    const remaining=all.filter(a=>!order.includes(a.key));
    return [...ordered,...remaining];
  },[store]);
  const dedRowRefs=useRef({});
  const [dragKey,setDragKey]=useState(null);
  const [dragOrderKeys,setDragOrderKeys]=useState(null);
  const dedDisplayList=useMemo(()=>{
    const byKey=Object.fromEntries(dedItemsList.map(r=>[r.key,r]));
    const keys=dragOrderKeys||dedItemsList.map(r=>r.key);
    return keys.map(k=>byKey[k]).filter(Boolean);
  },[dedItemsList,dragOrderKeys]);
  const startDedDrag=(e,key)=>{
    e.preventDefault();
    setDragKey(key);
    setDragOrderKeys(dedItemsList.map(r=>r.key));
    e.target.setPointerCapture&&e.target.setPointerCapture(e.pointerId);
  };
  const onDedDragMove=(e)=>{
    if(!dragKey) return;
    const y=e.clientY;
    setDragOrderKeys((prev)=>{
      if(!prev) return prev;
      const keys=[...prev];
      const idx=keys.indexOf(dragKey);
      for(let i=0;i<keys.length;i++){
        if(i===idx) continue;
        const el=dedRowRefs.current[keys[i]];
        if(!el) continue;
        const rect=el.getBoundingClientRect();
        const mid=rect.top+rect.height/2;
        if((i<idx&&y<mid)||(i>idx&&y>mid)){
          keys.splice(idx,1);
          keys.splice(i,0,dragKey);
          return keys;
        }
      }
      return keys;
    });
  };
  const endDedDrag=()=>{
    if(dragKey&&dragOrderKeys) upd((p)=>({...p,swissDedOrder:dragOrderKeys}));
    setDragKey(null);
    setDragOrderKeys(null);
  };

  // 외부매출
  const charterList=useMemo(()=>store?store.charters.filter((c)=>c.date?.startsWith(monthStr)).sort((a,b)=>a.date.localeCompare(b.date)):[],[store,monthStr]);
  const charterTotal=charterList.reduce((s,c)=>s+(Number(c.amount)||0),0);
  const charterPaid=charterList.filter((c)=>c.paid).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const addCharter=()=>upd((p)=>({...p,charters:[...p.charters,{id:uid(),date:ymd(year,month,1),desc:"",amount:0,paid:false,memo:""}]}));
  const updCharter=(id,f,v)=>upd((p)=>({...p,charters:p.charters.map((c)=>c.id===id?{...c,[f]:v}:c)}));
  const delCharter=(id)=>upd((p)=>({...p,charters:p.charters.filter((c)=>c.id!==id)}));
  const dayMemoCharters=useMemo(()=>sel?(store?.charters||[]).filter(c=>c.date===sel&&c.memo&&c.memo.trim()):[],[store,sel]);
  const addDayMemo=()=>{const v=memoInput.trim();if(!v||!sel)return;upd((p)=>({...p,charters:[...p.charters,{id:uid(),date:sel,desc:v,amount:0,paid:false,memo:v}]}));setMemoInput("");};
  const openMemoEdit=(c)=>setMemoEdit({id:c.id,value:c.memo||""});
  const closeMemoEdit=()=>setMemoEdit(null);
  const saveMemoEdit=()=>{if(memoEdit)updCharter(memoEdit.id,"memo",memoEdit.value.trim());setMemoEdit(null);};

  // 장부
  const ledgerMonth=useMemo(()=>store?store.ledger.filter((e)=>e.date?.startsWith(monthStr)).sort((a,b)=>a.date.localeCompare(b.date)):[],[store,monthStr]);
  const carryover=useMemo(()=>Number(ledgerMonth.find((e)=>e.type==="carryover")?.amount)||0,[ledgerMonth]);
  const manualRows=useMemo(()=>ledgerMonth.filter((e)=>e.type!=="carryover"),[ledgerMonth]);

  const autoRows=useMemo(()=>{
    if(!store) return [];
    const rows=[];
    // 스위스 운행매출은 다음달 20일 입금이므로 자동 수입에서 제외
    // 주유비만 자동 지출로 포함
    Object.entries(store.days).forEach(([k,dd])=>{
      if(!k.startsWith(monthStr)) return;
      // 주유비는 스위스공제에만 반영 (지출입장부 제외)
    });

    charterList.filter(c=>c.paid).forEach((c)=>rows.push({id:"charter-"+c.id,date:c.date,type:"income",desc:"외부매출-"+(c.desc||""),amount:Number(c.amount)||0,payMethod:"자동",source:"charter"}));

  const allRows=useMemo(()=>[...autoRows,...manualRows].sort((a,b)=>a.date.localeCompare(b.date)),[autoRows,manualRows]);
  const totIncome=useMemo(()=>carryover+allRows.reduce((s,r)=>r.type==="income"?s+r.amount:s,0),[carryover,allRows]);
  const cashExpense=useMemo(()=>allRows.reduce((s,r)=>(r.type==="expense"&&r.payMethod==="현금")?s+r.amount:s,0),[allRows]);
  const incomeSum=useMemo(()=>allRows.reduce((s,r)=>r.type==="income"?s+r.amount:s,0),[allRows]);
  const totalExpense=useMemo(()=>allRows.reduce((s,r)=>r.type==="expense"?s+r.amount:s,0),[allRows]);
  const bankBalance=useMemo(()=>carryover+incomeSum-cashExpense,[carryover,incomeSum,cashExpense]);
  const totExpense=useMemo(()=>allRows.reduce((s,r)=>r.type==="expense"?s+r.amount:s,0),[allRows]);

  const allCards=useMemo(()=>[...CARDS,...(store?.customCards||[]).map(c=>c.name).filter(Boolean)],[store]);
  const cardTotals=useMemo(()=>{
    const t={};allCards.forEach((c)=>{t[c]=0;});
    manualRows.forEach((e)=>{if(e.type==="expense"&&allCards.includes(e.payMethod)) t[e.payMethod]+=(Number(e.amount)||0);});

  },[manualRows,allCards]);
  // 카드사별 실제 이용기간 사용액 합계 → "이번 달 25일에 실제로 통장에서 빠져나가는 금액" (결제일이 25일로 설정된 카드만 정확한 이용기간 계산 가능, 그 외는 달력 월 합계로 대체)
  const cardCycleTotals=useMemo(()=>{
    const t={};
    const startM=month===1?12:month-1, startY=month===1?year-1:year;
    allCards.forEach((card)=>{
      const payDay=(store?.cardPayDays||{})[card]||25;
      const cyc=payDay===25?CARD_CYCLE_25[card]:null;
      if(!cyc){t[card]=cardTotals[card]||0;return;}
      const startDate=ymd(startY,startM,cyc.startDay);
      const endDate=ymd(year,month,cyc.endDay);
      t[card]=(store?.ledger||[]).reduce((s,e)=>(e.type==="expense"&&e.payMethod===card&&e.date>=startDate&&e.date<=endDate)?s+(Number(e.amount)||0):s,0);
    });
    return t;
  },[store,year,month,allCards,cardTotals]);

  const addEntry=()=>{
    const amt=Number(newEnt.amount)||0;if(!newEnt.date||amt===0) return;
    upd((p)=>({...p,ledger:[...p.ledger,{id:uid(),date:newEnt.date,type:newEnt.type,desc:newEnt.desc,amount:amt,payMethod:newEnt.payMethod}]}));
    setNewEnt({...newEnt,desc:"",amount:""});
  };
  const setCarryover=(v)=>{
    const amt=Number(v)||0;
    upd((p)=>{const ex=p.ledger.find((e)=>e.date?.startsWith(monthStr)&&e.type==="carryover");
      const ledger=ex?p.ledger.map((e)=>e.id===ex.id?{...e,amount:amt}:e):[...p.ledger,{id:uid(),date:ymd(year,month,1),type:"carryover",desc:"전월이월",amount:amt,payMethod:"자동"}];
      return {...p,ledger};});
  };
  const delEntry=(id)=>upd((p)=>({...p,ledger:p.ledger.filter((e)=>e.id!==id)}));
  const updEntryDesc=(id,val)=>upd((p)=>({...p,ledger:p.ledger.map((e)=>e.id===id?{...e,desc:val}:e)}));

  // 대출
  const addLoan=()=>upd((p)=>({...p,loans:[...p.loans,{id:uid(),title:"새 대출 건",creditor:"",debtor:"",principal:0,memo:"",installments:[]}]}));
  const updLoan=(id,f,v)=>upd((p)=>({...p,loans:p.loans.map((l)=>l.id===id?{...l,[f]:v}:l)}));
  const delLoan=(id)=>upd((p)=>({...p,loans:p.loans.filter((l)=>l.id!==id)}));
  const addInst=(lid)=>upd((p)=>({...p,loans:p.loans.map((l)=>l.id===lid?{...l,installments:[...l.installments,{id:uid(),seq:l.installments.length+1,amount:0,paid:false,memo:""}]}:l)}));
  const updInst=(lid,iid,f,v)=>upd((p)=>({...p,loans:p.loans.map((l)=>l.id===lid?{...l,installments:l.installments.map((i)=>i.id===iid?{...i,[f]:v}:i)}:l)}));
  const delInst=(lid,iid)=>upd((p)=>({...p,loans:p.loans.map((l)=>l.id===lid?{...l,installments:l.installments.filter((i)=>i.id!==iid)}:l)}));

  if(!store) return <div style={S.loading}>불러오는 중…</div>;

  const todayKey=ymd(today.getFullYear(),today.getMonth()+1,today.getDate());
  const nextMonth25=month===12?ymd(year+1,1,25):ymd(year,month+1,25);
  const thisMonth25=ymd(year,month,25);

  return (
    <div style={S.app}>
      <style>{`*{box-sizing:border-box;}.bc:hover{background:#eef1f8!important;cursor:pointer;}.ptag{transition:transform .08s,background .15s;}.ptag:active{transform:scale(.96);}::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-thumb{background:#b0bad0;border-radius:4px;}table.T{width:100%;border-collapse:collapse;}table.T th,table.T td{padding:7px 6px;font-size:12.5px;border-bottom:1px solid #d0d8e8;vertical-align:middle;}table.T th{color:#1a2535;font-weight:700;text-align:left;}table.T input[type=number],table.T input[type=text],table.T input[type=date]{background:#eef1f8;border:1px solid #b8c4d8;border-radius:6px;color:#0d1520;font-weight:500;padding:5px 7px;font-size:12.5px;width:100%;outline:none;}input.dateOverlay::-webkit-calendar-picker-indicator{position:absolute;left:0;top:0;width:100%;height:100%;margin:0;padding:0;opacity:0;cursor:pointer;}.ra{background:rgba(59,110,143,.06);}.rc{background:rgba(47,143,111,.06);}@media(max-width:600px){.cal-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 8px 8px 0;}.cal-wkrow{display:grid!important;grid-template-columns:repeat(7,90px)!important;width:630px!important;min-width:630px!important;margin-bottom:4px;gap:3px!important;}.cal-grid{display:grid!important;grid-template-columns:repeat(7,90px)!important;width:630px;gap:3px!important;}.cal-cell{min-height:90px!important;width:90px!important;padding:5px 4px!important;border-radius:7px!important;box-sizing:border-box!important;}.cal-dnum{font-size:12px!important;font-weight:700!important;}.cal-tag{font-size:10px!important;padding:2px 4px!important;border-radius:4px!important;font-weight:700!important;white-space:nowrap!important;overflow:visible!important;text-overflow:clip!important;}}table.T.rt{table-layout:fixed;}table.T.rt th:first-child,table.T.rt td:first-child{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}@media(max-width:600px){table.T.rt th.cCnt{width:34px!important;padding-left:2px!important;padding-right:2px!important;}table.T.rt th.cPrice{width:72px!important;}table.T.rt th.cPrice2{width:72px!important;}table.T.rt th.cTotal{width:58px!important;}table.T.rt th.cX{width:20px!important;}table.T.rt td:first-child{font-size:12px!important;}}`}</style>

      <div style={S.header}>
        <div><div style={S.title}>버스 운행 일정표</div></div>
        <span style={{fontSize:12,color:"#6fae8a"}}>{saveState==="saving"?"저장 중…":saveState==="saved"?"저장됨 ✓":saveState==="error"?"저장 실패":""}</span>
      </div>

      <div style={S.tabRow}>
        {displayTabs.map((t)=>tabEditMode?(
          <div key={t.id} ref={(el)=>{tabRowRefs.current[t.id]=el;}}
            style={{display:"flex",alignItems:"center",gap:4,background:dragTabKey===t.id?"#eef3fb":"#eef1f8",border:"1px solid #c8d0e0",borderRadius:8,padding:"4px 6px",flexShrink:0}}>
            <button
              onPointerDown={(e)=>startTabDrag(e,t.id)}
              onPointerMove={onTabDragMove}
              onPointerUp={endTabDrag}
              onPointerCancel={endTabDrag}
              style={{border:"none",background:"transparent",cursor:dragTabKey===t.id?"grabbing":"grab",touchAction:"none",fontSize:14,color:"#6b7585",padding:"0 2px"}}>⠿</button>
            <input value={t.label} onChange={(e)=>renameTab(t.id,e.target.value)} style={{width:64,border:"1px solid #c8d0e0",borderRadius:5,padding:"3px 5px",fontSize:12.5,color:"#1a2535",background:"#fff"}}/>
          </div>

          <button key={t.id} style={{...S.tabBtn,...(tab===t.id?S.tabOn:{})}} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
        <button style={{...S.tabBtn,background:tabEditMode?"#3b6e8f":"transparent",color:tabEditMode?"#fff":"#3b6e8f",border:"1px solid #3b6e8f",flexShrink:0}} onClick={()=>setTabEditMode((v)=>!v)}>{tabEditMode?"완료":"✎ 편집"}</button>
      </div>

      {["calendar","stats","charter","swissRevenue","swissDeduction","ledger","cardExpense"].includes(tab)&&(
        <div style={S.mNav}>
          <button style={S.navArr} onClick={()=>goMonth(-1)}>‹</button>
          <div style={S.mLabel}>{year}년 {month}월</div>
          <button style={S.navArr} onClick={()=>goMonth(1)}>›</button>
          <button style={S.todayBtn} onClick={()=>{setYear(today.getFullYear());setMonth(today.getMonth()+1);}}>오늘</button>
        </div>
      )}

      {/* 달력 */}
      {tab==="calendar"&&(<>
        <div className="cal-outer">
          <div className="cal-wkrow" style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",minWidth:490,marginBottom:5}}>
            {WEEKDAYS.map((w,i)=><div key={w} style={{textAlign:"center",fontSize:12,fontWeight:600,padding:"4px 0",color:i===0?"#e07a7a":i===6?"#7aa3e0":"#9aa3b5"}}>{w}</div>)}
          </div>
          <div className="cal-grid" style={S.grid}>
          {grid.map((d,i)=>{
            if(!d) return <div key={i} style={{minHeight:82}}/>;
            const k=ymd(year,month,d),dd=getEffectiveDay(k,store);
            // 외부매출에 등록된 날짜면 왼쪽 셀에 '외부' 고정 표시, 각 건의 메모는 오른쪽 셀에 텍스트로 표시
            const dayCharters=(store.charters||[]).filter(c=>c.date===k);
            const hasCharter=dayCharters.length>0;
            const charterMemos=[...new Set(dayCharters.map(c=>c.memo&&c.memo.trim()).filter(Boolean))];
            const mergedAm=hasCharter&&!dd.am.includes("외부")?[...dd.am,"외부"]:dd.am;
            const displayDd={...dd,am:mergedAm};

            return (
              <div key={i} className="cal-cell bc" style={{...S.cell,...(isT?S.cellT:{})}} onClick={()=>openDay(d)}>
                <div style={{...S.dNum,color:(dow===0||holidayName)?"#d03030":dow===6?"#2060d0":"#1a2535"}}>{d}</div>
                {holidayName&&<div style={{fontSize:8,color:"#d03030",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{holidayName}</div>}
                {(displayDd.in||displayDd.out)&&<div style={S.clkRow}><span style={{color:"#6fae8a"}}>{displayDd.in||"-"}</span><span style={{color:"#4a5266"}}>/</span><span style={{color:"#d99a6f"}}>{displayDd.out||"-"}</span></div>}
                <div style={S.splitWrap}>

                    {displayDd.pm.length>3&&<span style={{fontSize:8.5,color:"#7a8295"}}>+{displayDd.pm.length-3}</span>}
                    {charterMemos.map((m,idx)=><div key={"memo"+idx} style={{fontSize:8.5,color:"#1a2535",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{m}</div>)}
                  </div>

              </div>

      {tab==="swissRevenue"&&(

          <table className="T rt">
            <thead><tr><th>노선</th><th className="cCnt" style={{width:70,textAlign:"center"}}>횟수</th><th className="cPrice" style={{width:130}}>스위스 매출 단가</th><th className="cTotal" style={{width:110,textAlign:"right"}}>합계</th><th className="cX" style={{width:28}}></th></tr></thead>
            <tbody>
              {PRICED_ROUTES.concat(store.promotedRoutes||[]).filter(r=>!(store.hiddenSwissRoutes||[]).includes(r)).map((r)=>{
                const cnt=(stats.byP[r]?.am||0)+(stats.byP[r]?.pm||0);
                const price=store.swissRevenue[r]??DEFAULT_PRICES[r]??0;
                const isPromoted=(store.promotedRoutes||[]).includes(r);
                return (
                  <tr key={r}>
                    <td>

                  </tbody>
                </table>
                <button style={S.addRowBtn} onClick={()=>addInst(loan.id)}>+ 회차 추가</button>
                <div style={{display:"flex",gap:16,marginTop:10,fontSize:12.5,flexWrap:"wrap"}}>
                  <span>합계: <b>{fmt(tot)}원</b></span>
                  <span>완납: <b style={{color:"#1a6b3a"}}>{fmt(paid)}원</b></span>
                  <span>미납: <b style={{color:"#b03030"}}>{fmt(tot-paid)}원</b></span>
                </div>
              </div>
            );
          })}
          <button style={S.addRowBtn} onClick={addLoan}>+ 대출/할부 추가</button>
        </div>
      )}

      {/* 달력 모달 */}
      {sel&&(
        <div style={S.overlay} onClick={closeDay}>
          <div style={S.modal} onClick={(e)=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:15,fontWeight:700}}>{sel} 일정{HOLIDAYS[sel]&&<span style={{color:"#d03030",fontSize:12,fontWeight:700,marginLeft:8}}>({HOLIDAYS[sel]})</span>}</div>
              <button style={{background:"transparent",border:"none",color:"#8a93a6",fontSize:16,cursor:"pointer"}} onClick={closeDay}>✕</button>
            </div>
            <div style={S.sLbl}>출근 / 퇴근</div>
            <div style={{display:"flex",gap:10}}>
              {[["출근",dIn,setDIn],["퇴근",dOut,setDOut]].map(([lbl,val,set])=>(
                <div key={lbl} style={{flex:1}}><div style={{fontSize:11,color:"#9aa3b5",marginBottom:3}}>{lbl}</div><input style={S.ti} type="time" value={val} onChange={(e)=>set(e.target.value)}/></div>
              ))}
            </div>
            <div style={S.sLbl}>주유비 (이 날 주유 금액)</div>
            <input style={S.ti} type="number" value={dFuel} onChange={(e)=>setDFuel(e.target.value)} placeholder="예: 562081"/>
            {[["오전 노선 (출근)",dAm,setDAm,cAm,setCAm,"am"],["오후 노선 (퇴근)",dPm,setDPm,cPm,setCPm,"pm"]].map(([lbl,draft,setDraft,cv,setCv,period])=>(
              <div key={period}>
                <div style={S.sLbl}>{lbl}</div>
                <details style={{marginTop:2}}>
                  <summary style={{cursor:"pointer",padding:"5px 8px",background:"#dde3ef",borderRadius:6,fontSize:12,color:"#3b6e8f",listStyle:"none",userSelect:"none"}}>▶ 추가 노선 선택 ({ALL_PICKABLE_ROUTES.length+(store.customPriceRoutes||[]).filter(cr=>cr.name).length+(store.promotedRoutes||[]).filter(r=>!ALL_PICKABLE_ROUTES.includes(r)).length}개)</summary>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5,maxHeight:150,overflowY:"auto",padding:4,background:"#f5f7fc",borderRadius:6,border:"1px solid #dde3ef"}}>
                    {ALL_PICKABLE_ROUTES.map((r)=>{
                      const on=draft.includes(r);
                      const c=colorFor(r);
                      return <button key={r} className="ptag" style={{border:"1px solid",borderRadius:5,padding:"3px 7px",fontSize:11,cursor:"pointer",background:on?c:"#fff",borderColor:c,color:on?"#fff":c}} onClick={()=>toggleR(period,r)}>{r}</button>;
                    })}
                    {(store.promotedRoutes||[]).filter(r=>!ALL_PICKABLE_ROUTES.includes(r)).map((r)=>{
                      const on=draft.includes(r);
                      const c=colorFor(r);
                      return <button key={r} className="ptag" style={{border:"1px solid",borderRadius:5,padding:"3px 7px",fontSize:11,cursor:"pointer",background:on?c:"#fff",borderColor:c,color:on?"#fff":c}} onClick={()=>toggleR(period,r)}>{r}</button>;
                    })}
                    {(store.customPriceRoutes||[]).filter(cr=>cr.name).map((cr)=>{
                      const on=draft.includes(cr.name);
                      const c=colorFor(cr.name);
                      return <button key={cr.id} className="ptag" style={{border:"1px solid",borderRadius:5,padding:"3px 7px",fontSize:11,cursor:"pointer",background:on?c:"#fff",borderColor:c,color:on?"#fff":c}} onClick={()=>toggleR(period,cr.name)}>{cr.name}</button>;
                    })}
                  </div>
                </details>
                <div style={{display:"flex",gap:6,marginTop:5}}>
                  <input style={{...S.ti,flex:1}} value={cv} onChange={(e)=>setCv(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&addC(period)} lang="ko" placeholder="직접 입력"/>
                  <button style={S.addBtn} onClick={()=>addC(period)}>추가</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:80,overflowY:"auto",marginTop:4}}>
                  {draft.length===0&&<div style={{fontSize:11.5,color:"#5e6678"}}>일정 없음</div>}
                  {draft.map((item,idx)=>(
                    <div key={idx} style={{display:"flex",alignItems:"center",gap:7,background:"#171b24",border:"1px solid #262c39",borderRadius:7,padding:"4px 9px"}}>
                      <span style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:colorFor(item)}}/>
                      <span style={{fontSize:12.5,flex:1,color:"#fff"}}>{item}</span>
                      <button style={S.rBtn} onClick={()=>setDraft((p)=>p.filter((_,i)=>i!==idx))}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div style={S.sLbl}>메모 (달력 오른쪽 셀에 바로 표시)</div>
            <div style={{display:"flex",gap:6,marginTop:2}}>
              <input style={{...S.ti,flex:1}} value={memoInput} onChange={(e)=>setMemoInput(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&addDayMemo()} lang="ko" placeholder="예: OO중학교==>용평"/>
              <button style={S.addBtn} onClick={addDayMemo}>추가</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:80,overflowY:"auto",marginTop:6}}>
              {dayMemoCharters.length===0&&<div style={{fontSize:11.5,color:"#5e6678"}}>등록된 메모 없음</div>}
              {dayMemoCharters.map((c)=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:7,background:"#171b24",border:"1px solid #262c39",borderRadius:7,padding:"4px 9px"}}>
                  <span style={{fontSize:12.5,flex:1,color:"#fff"}}>{c.memo}</span>
                  <button style={S.rBtn} onClick={()=>{if(!c.amount&&!c.paid)delCharter(c.id);else updCharter(c.id,"memo","");}}>✕</button>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginTop:18}}>
              <button style={S.clearBtn} onClick={clearDay}>비우기</button>
              <button style={S.saveBtn} onClick={saveDay}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* 메모 입력 팝업 */}
      {memoEdit&&(
        <div style={S.overlay} onClick={closeMemoEdit}>
          <div style={{...S.modal,maxWidth:340}} onClick={(e)=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:15,fontWeight:700}}>메모 (달력 오른쪽 셀에 표시)</div>
              <button style={{background:"transparent",border:"none",color:"#8a93a6",fontSize:16,cursor:"pointer"}} onClick={closeMemoEdit}>✕</button>
            </div>
            <textarea autoFocus style={{...S.loanMemo,minHeight:70}} value={memoEdit.value} onChange={(e)=>setMemoEdit({...memoEdit,value:e.target.value})} placeholder="예: OO중학교==>용평"/>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button style={S.clearBtn} onClick={()=>{setMemoEdit({...memoEdit,value:""});}}>지우기</button>
              <button style={S.saveBtn} onClick={saveMemoEdit}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const S={
  app:{fontFamily:"'Pretendard',-apple-system,'Malgun Gothic',sans-serif",background:"#f0f3f8",color:"#0d1520",minHeight:"100%",padding:"16px 12px 32px",maxWidth:780,margin:"0 auto"},
  loading:{display:"flex",alignItems:"center",justifyContent:"center",height:300,background:"#f0f3f8",color:"#2a3348"},

  tabRow:{display:"flex",gap:3,background:"#c8d4e8",padding:4,borderRadius:10,marginBottom:12,overflowX:"auto"},

  mLabel:{fontSize:15,fontWeight:600,minWidth:100,textAlign:"center"},
  todayBtn:{border:"1px solid #2f3645",background:"transparent",color:"#2a3348",fontSize:12,padding:"5px 10px",borderRadius:7,cursor:"pointer"},
  wkRow:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:5},
  wkCell:{textAlign:"center",fontSize:12,fontWeight:600,padding:"4px 0"},

  cell:{minHeight:90,minWidth:0,background:"#ffffff",border:"1px solid #262c39",borderRadius:8,padding:"5px 4px",display:"flex",flexDirection:"column",gap:2,overflow:"hidden"},
  cellT:{background:"#fff3c4"},
  dNum:{fontSize:12,fontWeight:600},
  clkRow:{display:"flex",alignItems:"center",gap:2,fontSize:9,color:"#2a3348"},
  splitWrap:{display:"flex",flex:1},splitCol:{flex:1,display:"flex",flexDirection:"column",gap:2,minWidth:0,justifyContent:"flex-start"},
  splitDiv:{width:1,background:"#eef1f8",margin:"0 3px"},
  mTag:{fontSize:9,padding:"2px 4px",borderRadius:4,border:"1.5px solid",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:700,display:"block",maxWidth:"100%",boxSizing:"border-box",height:15,lineHeight:"11px",flexShrink:0,flexGrow:0},
  fuelRow:{marginTop:"auto",fontSize:10.5,fontWeight:700,color:"#c0392b",textAlign:"right"},
  panel:{paddingTop:2},hint:{fontSize:11.5,color:"#3a4860",marginBottom:10},
  totalBar:{fontSize:13.5,color:"#0d1520",padding:"12px 0"},
  settleBox:{background:"#ffffff",border:"1px solid #262c39",borderRadius:10,padding:"12px 14px",marginBottom:12},
  settleTitle:{fontSize:12.5,fontWeight:700,color:"#2a3348",marginBottom:8},
  cardBlock:{background:"#ffffff",border:"1px solid #262c39",borderRadius:10,padding:"12px 14px",marginBottom:10},
  cardTitle:{fontSize:14,fontWeight:700,marginBottom:8},
  cardFooter:{fontSize:12.5,color:"#0d1520",marginTop:8,paddingTop:8,borderTop:"1px solid #262c39",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6},
  carryRow:{display:"flex",alignItems:"center",gap:8,marginBottom:12,background:"#ffffff",border:"1px solid #2f3645",borderRadius:9,padding:"10px 12px"},
  carryInput:{flex:1,background:"#f0f3f8",border:"1px solid #2f3645",borderRadius:7,color:"#0d1520",padding:"7px 10px",fontSize:13,outline:"none",textAlign:"right"},
  entryForm:{display:"flex",gap:4,marginTop:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"},
  ef:{background:"#f0f3f8",border:"1px solid #2f3645",borderRadius:8,padding:"7px 8px",color:"#0d1520",fontSize:12,outline:"none"},
  badge:{display:"inline-block",padding:"2px 7px",borderRadius:5,background:"#c8d4e8",color:"#2a3348",fontSize:11,fontWeight:600},
  summary:{background:"#ffffff",border:"1px solid #3b6e8f",borderRadius:10,padding:"12px 14px",marginTop:12},
  sRow:{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0",color:"#0d1520"},
  sFinal:{borderTop:"1px solid #2f3645",marginTop:6,paddingTop:10,fontSize:15,fontWeight:700,color:"#1a2535"},
  statCard:{flex:1,background:"#ffffff",border:"1px solid #262c39",borderRadius:10,padding:"12px 14px"},
  sLbl2:{fontSize:11,color:"#2a3348",marginBottom:4},sVal:{fontSize:20,fontWeight:700},
  addRowBtn:{marginTop:10,border:"1px dashed #3a4254",background:"transparent",color:"#2a3348",borderRadius:8,padding:"8px 14px",fontSize:12.5,cursor:"pointer",width:"100%"},
  loanCard:{background:"#ffffff",border:"1px solid #262c39",borderRadius:10,padding:"14px",marginBottom:14},
  loanTitle:{flex:1,background:"transparent",border:"none",borderBottom:"1px solid #2f3645",color:"#0d1520",fontSize:14,fontWeight:700,padding:"4px 2px",outline:"none"},
  loanMemo:{width:"100%",minHeight:50,background:"#f0f3f8",border:"1px solid #2f3645",borderRadius:8,color:"#0d1520",fontSize:12,padding:"8px 10px",resize:"vertical",fontFamily:"inherit"},
  overlay:{position:"fixed",inset:0,background:"rgba(10,12,16,.65)",display:"flex",alignItems:"center",justifyContent:"center",padding:14,zIndex:50},

  pickTag:{border:"1px solid",borderRadius:7,padding:"5px 8px",fontSize:11.5,cursor:"pointer"},
  addBtn:{border:"1px solid #2f3645",background:"#eaecf3",color:"#0d1520",borderRadius:8,padding:"0 12px",fontSize:13,cursor:"pointer",height:36},
  rBtn:{background:"transparent",border:"none",color:"#5a6478",cursor:"pointer",fontSize:13},
  clearBtn:{flex:1,border:"1px solid #4a2f33",background:"transparent",color:"#c0392b",borderRadius:8,padding:"10px 0",fontSize:13,cursor:"pointer"},
  saveBtn:{flex:2,border:"none",background:"#3b6e8f",color:"#fff",borderRadius:8,padding:"10px 0",fontSize:13,fontWeight:600,cursor:"pointer"},

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
  <script>
    if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
    let dp;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;const b=document.getElementById('ib');if(b)b.style.display='flex';});
    function ia(){if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;document.getElementById('ib').style.display='none';});}}
    if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!sessionStorage.getItem('ih')){sessionStorage.setItem('ih','1');setTimeout(()=>alert('📱 아이폰:\n하단 공유버튼 → 홈 화면에 추가'),1500);}
  </script>
  <div id="ib" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#3b6e8f;padding:14px 16px;z-index:9999;align-items:center;gap:10px;">
    <div style="flex:1;color:#fff;font-family:sans-serif;font-size:13px;">📱 홈 화면에 앱으로 설치하시겠어요?</div>
    <button onclick="ia()" style="background:#fff;border:none;color:#3b6e8f;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">설치</button>
    <button onclick="document.getElementById('ib').style.display='none'" style="background:transparent;border:none;color:#fff;font-size:16px;cursor:pointer">✕</button>
  </div>
