<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState,useEffect,useMemo,useCallback}=React;

const ROUTES = ["수원2","동탄2","중앙문","외대","동탄SDI","동탄대차","신영통","잠실","동탄셔틀","천안,동탄","망포역,망포동","외부","공휴일"];
const PRICED_ROUTES = ROUTES.filter((r)=>!["외부","외대","공휴일"].includes(r));
const ROUTE_COLORS = {
  "수원2":"#2563eb",
  "동탄2":"#16a34a",
  "중앙문":"#d97706",
  "외대":"#7c3aed",
  "동탄SDI":"#0891b2",
  "동탄대차":"#9333ea",
  "신영통":"#dc2626",
  "잠실":"#0d9488",
  "동탄셔틀":"#0284c7",
  "천안,동탄":"#c026d3",
  "망포역,망포동":"#ea580c",
  "외부":"#e03030",
  "공휴일":"#64748b"
};
const DEFAULT_PRICES = {"수원2":123400,"동탄2":112300,"중앙문":96000,"외대":155000,"동탄SDI":0,"동탄대차":0,"신영통":123400,"잠실":176900,"동탄셔틀":0,"천안,동탄":400000,"망포역,망포동":96000,"외부":0,"공휴일":0};
const DEFAULT_DEDUCTIONS = Object.fromEntries(ROUTES.map((r)=>[r,0]));
const DEFAULT_WAEDAE = {amPrice:160000,amIncome:150000,pmPrice:150000,pmIncome:150000};

const SWISS_DED_ITEMS = [
  {key:"차량할부금",default:2949250},
  {key:"보험료",default:327660},
  {key:"주유비",default:0,auto:true},
  {key:"국민연금",default:189000},
  {key:"건강보험",default:168160},
  {key:"고용보험",default:43050},
  {key:"조합비",default:15500},
  {key:"범칙금",default:0},
  {key:"영업비",default:400000},
  {key:"기타지출",default:10890},
  {key:"통행료",default:76370},
  {key:"사업소득세",default:125950},
  {key:"소득,주민세",default:25010},
  {key:"상조회비",default:20000},
  {key:"GPS",default:15000},
];
const TOTAL_DEFAULT_SWISS = SWISS_DED_ITEMS.reduce((s,i)=>s+i.default,0);

const CARDS = ["국민","농협","삼성","롯데"];
const PAY_METHODS = ["현금",...CARDS];

const TABS = [
  {id:"calendar",label:"달력"},
  {id:"swissRevenue",label:"스위스매출"},
  {id:"swissDeduction",label:"스위스공제"},
  {id:"charter",label:"외부매출"},
  {id:"ledger",label:"지출입장부"},
  {id:"cardExpense",label:"카드지출"},
  {id:"stats",label:"노선통계"},
  {id:"prices",label:"노선단가"},
  {id:"loans",label:"대출관리"},
  
];

// 스위스매출 커스텀 항목 자동 색상 팔레트
const COLOR_PALETTE = ["#e67e22","#8e44ad","#16a085","#c0392b","#2980b9","#d35400","#27ae60","#7f8c8d","#f39c12","#1abc9c","#e74c3c","#6c3483","#117a65","#1a5276","#784212"];
function pickColor(usedColors){
  return COLOR_PALETTE.find(c=>!usedColors.includes(c))||COLOR_PALETTE[Math.floor(Math.random()*COLOR_PALETTE.length)];
}

const STORAGE_KEY = "bus-schedule-share-v1";

const EXTRA_ROUTES = [
  "경희대/망포역/중앙문","경희대/망포역/중앙문(신)","경희대/영통역/청명역",
  "곡반정동","군포/안양/구로","권선동/망포역","기흥반도체",
  "기흥사업장-동탄사업장","기흥사업장-천안사업장","망포동/망포역",
  "망포역","망포역/망포동","망포역/중앙문","목동","미아",
  "버스터미널/망포역","사당/이수역","상갈역","수원역2","신봉/수지",
  "신영통/곡반정동","신촌","양재/강남/신사","영통역/곡반정동",
  "영통역/광교","잠실역","장안구","천안사업장",
  "천안사업장-기흥사업장(공문)","평촌","화곡","동탄2A","동탄2B",
  "동탄사업장-기흥사업장","광교"
].filter(r=>!ROUTES.includes(r));

const EXTRA_COLOR = "#5a7a9e";
function getRouteColor(r){return ROUTE_COLORS[r]||EXTRA_COLOR;}




const DEFAULT_AM=[];
const DEFAULT_PM=[];
function getEffectiveDay(key,store){
  const stored=store?.days?.[key];
  if(stored&&(stored.am.length>0||stored.pm.length>0||stored.in||stored.out||stored.fuel)) return stored;
  const [y,m,d]=key.split("-").map(Number);
  const dow=new Date(y,m-1,d).getDay();
  if(dow>=1&&dow<=5) return {am:[...DEFAULT_AM],pm:[...DEFAULT_PM],in:stored?.in||"",out:stored?.out||"",fuel:stored?.fuel||""};
  return stored||{am:[],pm:[],in:"",out:"",fuel:""};
}

const WEEKDAYS = ["일","월","화","수","목","금","토"];
const pad = (n)=>String(n).padStart(2,"0");
const ymd = (y,m,d)=>`${y}-${pad(m)}-${pad(d)}`;
const mk = (y,m)=>`${y}-${pad(m)}`;
const fmt = (n)=>(n||0).toLocaleString("ko-KR");
const uid = ()=>Math.random().toString(36).slice(2,9);
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function buildGrid(y,m){
  const off=new Date(y,m-1,1).getDay(),total=daysInMonth(y,m);
  const c=Array(off).fill(null);
  for(let d=1;d<=total;d++) c.push(d);
  while(c.length%7!==0) c.push(null);
  return c;
}

const SEED_DAYS={};
const SEED_CHARTERS=[];
const SEED_LOANS=[];

function makeDays(){
  const d={};
  Object.entries(SEED_DAYS).forEach(([k,v])=>{d[k]={am:v.am||[],pm:v.pm||[],in:"",out:"",fuel:""};});
  return d;
}
function makeSwissRev(){return Object.fromEntries([...PRICED_ROUTES,...(typeof EXTRA_ROUTES!=="undefined"?EXTRA_ROUTES:[])].map((r)=>[r,DEFAULT_PRICES[r]||0]));}
function makeSwissDed(){return Object.fromEntries(SWISS_DED_ITEMS.map((i)=>[i.key,i.default]));}

function initial(){
  return {days:makeDays(),prices:{...DEFAULT_PRICES},deductions:{...DEFAULT_DEDUCTIONS},waedae:{...DEFAULT_WAEDAE},swissRevenue:makeSwissRev(),customSwissRoutes:[],charters:SEED_CHARTERS,swissDeductions:{},ledger:[],loans:SEED_LOANS};
}
function normalDay(d){
  if(!d) return {am:[],pm:[],in:"",out:"",fuel:""};
  if(Array.isArray(d.routes)) return {am:d.routes,pm:[],in:d.in||"",out:d.out||"",fuel:d.fuel||""};
  return {am:d.am||[],pm:d.pm||[],in:d.in||"",out:d.out||"",fuel:d.fuel||""};
}
function normalStore(s){
  const days={};
  Object.entries(s.days||{}).forEach(([k,d])=>{days[k]=normalDay(d);});
  return {days,prices:{...DEFAULT_PRICES,...(s.prices||{})},deductions:{...DEFAULT_DEDUCTIONS,...(s.deductions||{})},waedae:{...DEFAULT_WAEDAE,...(s.waedae||{})},swissRevenue:{...makeSwissRev(),...(s.swissRevenue||{})},customSwissRoutes:s.customSwissRoutes||[],charters:s.charters||[],swissDeductions:s.swissDeductions||{},ledger:s.ledger||[],loans:s.loans||SEED_LOANS,cardPayDays:s.cardPayDays||{},customPriceRoutes:s.customPriceRoutes||[],customCards:s.customCards||[]};
}

function App(){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth()+1);
  const [store,setStore]=useState(null);
  const [tab,setTab]=useState("calendar");
  const [saveState,setSaveState]=useState("idle");
  const [sel,setSel]=useState(null);
  const [dAm,setDAm]=useState([]);
  const [dPm,setDPm]=useState([]);
  const [dIn,setDIn]=useState("");
  const [dOut,setDOut]=useState("");
  const [dFuel,setDFuel]=useState("");
  const [cAm,setCAm]=useState("");
  const [cPm,setCPm]=useState("");
  const [newEnt,setNewEnt]=useState({date:"",type:"expense",desc:"",amount:"",payMethod:"현금"});

  useEffect(()=>{
    try{
      const raw=localStorage.getItem(STORAGE_KEY);
      setStore(raw?normalStore(JSON.parse(raw)):initial());
    }catch(e){setStore(initial());}
  },[]);

  const persist=useCallback((next)=>{
    setSaveState("saving");
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify(next));
      setSaveState("saved");
      setTimeout(()=>setSaveState("idle"),1000);
    }catch(e){setSaveState("error");}
  },[]);

  const upd=(fn)=>setStore((p)=>{const n=fn(p);persist(n);return n;});
  const monthStr=mk(year,month);
  const grid=useMemo(()=>buildGrid(year,month),[year,month]);

  const goMonth=(d)=>{let m=month+d,y=year;if(m<1){m=12;y--;}if(m>12){m=1;y++;}setMonth(m);setYear(y);};

  // 달력 모달
  const openDay=(d)=>{
    if(!d||!store) return;
    const k=ymd(year,month,d),dd=getEffectiveDay(k,store);
    setSel(k);setDAm([...dd.am]);setDPm([...dd.pm]);setDIn(dd.in||"");setDOut(dd.out||"");setDFuel(dd.fuel||"");setCAm("");setCPm("");
  };
  const closeDay=()=>{setSel(null);setDAm([]);setDPm([]);setDFuel("");};
  const toggleR=(period,r)=>{const s=period==="am"?setDAm:setDPm;s((p)=>p.includes(r)?p.filter((x)=>x!==r):[...p,r]);};
  const addC=(period)=>{const v=(period==="am"?cAm:cPm).trim();if(!v)return;(period==="am"?setDAm:setDPm)((p)=>[...p,v]);period==="am"?setCAm(""):setCPm("");};
  const saveDay=()=>{
    upd((p)=>{const days={...p.days};const has=dAm.length||dPm.length||dIn||dOut||dFuel;if(has)days[sel]={am:dAm,pm:dPm,in:dIn,out:dOut,fuel:dFuel};else delete days[sel];return {...p,days};});
    closeDay();
  };
  const clearDay=()=>{upd((p)=>{const days={...p.days};delete days[sel];return {...p,days};});closeDay();};

  // 통계
  const stats=useMemo(()=>{
    if(!store) return {counts:[],workedDays:0,byP:{}};
    const byP={};let w=0;
    const dim=daysInMonth(year,month);
    for(let d=1;d<=dim;d++){
      const k=ymd(year,month,d);
      const dd=getEffectiveDay(k,store);
      const all=[...dd.am,...dd.pm];
      if(all.length) w++;
      dd.am.forEach((r)=>{byP[r]=byP[r]||{am:0,pm:0};byP[r].am++;});
      dd.pm.forEach((r)=>{byP[r]=byP[r]||{am:0,pm:0};byP[r].pm++;});
    }
    const counts=Object.entries(byP).map(([r,c])=>[r,c.am+c.pm]).sort((a,b)=>b[1]-a[1]);
    return {counts,workedDays:w,byP};
  },[store,year,month]);

  const income4route=useCallback((route,period)=>{
    if(!store) return 0;
    if(route==="외대") return period==="am"?(store.waedae.amIncome||0):(store.waedae.pmIncome||0);
    return Math.max(0,(store.prices[route]||0)-(store.deductions[route]||0));
  },[store]);

  // 스위스매출 합계
  const swissRevTotal=useMemo(()=>{
    if(!store) return 0;
    return PRICED_ROUTES.reduce((s,r)=>{
      const cnt=(stats.byP[r]?.am||0)+(stats.byP[r]?.pm||0);
      return s+(store.swissRevenue[r]||0)*cnt;
    },0);
  },[store,stats]);

  // 주유비 합계
  const fuelTotal=useMemo(()=>{
    if(!store) return 0;
    return Object.entries(store.days).reduce((s,[k,d])=>k.startsWith(monthStr)?s+(Number(d.fuel)||0):s,0);
  },[store,monthStr]);

  // 스위스공제 이번달
  const swissDed=useMemo(()=>(store?.swissDeductions?.[monthStr])||makeSwissDed(),[store,monthStr]);
  const updSwissDed=(key,val)=>upd((p)=>({...p,swissDeductions:{...p.swissDeductions,[monthStr]:{...swissDed,[key]:val}}}));
  const swissDedTotal=useMemo(()=>SWISS_DED_ITEMS.reduce((s,i)=>s+(i.auto?fuelTotal:Number(swissDed[i.key]||0)),0),[swissDed,fuelTotal]);

  // 외부매출
  const charterList=useMemo(()=>store?store.charters.filter((c)=>c.date?.startsWith(monthStr)).sort((a,b)=>a.date.localeCompare(b.date)):[],[store,monthStr]);
  const charterTotal=charterList.reduce((s,c)=>s+(Number(c.amount)||0),0);
  const charterPaid=charterList.filter((c)=>c.paid).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const addCharter=()=>upd((p)=>({...p,charters:[...p.charters,{id:uid(),date:ymd(year,month,1),desc:"",amount:0,paid:false,slot:"am"}]}));
  const updCharter=(id,f,v)=>upd((p)=>({...p,charters:p.charters.map((c)=>c.id===id?{...c,[f]:v}:c)}));
  const delCharter=(id)=>upd((p)=>({...p,charters:p.charters.filter((c)=>c.id!==id)}));

  // 장부
  const ledgerMonth=useMemo(()=>store?store.ledger.filter((e)=>e.date?.startsWith(monthStr)).sort((a,b)=>a.date.localeCompare(b.date)):[],[store,monthStr]);
  const carryover=useMemo(()=>Number(ledgerMonth.find((e)=>e.type==="carryover")?.amount)||0,[ledgerMonth]);
  const manualRows=useMemo(()=>ledgerMonth.filter((e)=>e.type!=="carryover"),[ledgerMonth]);

  const autoRows=useMemo(()=>{
    if(!store) return [];
    const rows=[];
    // 스위스 운행매출은 다음달 20일 입금이므로 자동 수입에서 제외
    // 주유비만 자동 지출로 포함
    Object.entries(store.days).forEach(([k,dd])=>{
      if(!k.startsWith(monthStr)) return;
      // 주유비는 스위스공제에만 반영 (지출입장부 제외)
    });
    // 외부매출(전세)은 별도 수입으로 포함
    charterList.filter(c=>c.paid).forEach((c)=>rows.push({id:"charter-"+c.id,date:c.date,type:"income",desc:"외부매출-"+(c.desc||""),amount:Number(c.amount)||0,payMethod:"자동",source:"charter"}));
    return rows.sort((a,b)=>a.date.localeCompare(b.date));
  },[store,monthStr,charterList]);

  const allRows=useMemo(()=>[...autoRows,...manualRows].sort((a,b)=>a.date.localeCompare(b.date)),[autoRows,manualRows]);
  const totIncome=useMemo(()=>carryover+allRows.reduce((s,r)=>r.type==="income"?s+r.amount:s,0),[carryover,allRows]);
  const cashExpense=useMemo(()=>allRows.reduce((s,r)=>(r.type==="expense"&&r.payMethod==="현금")?s+r.amount:s,0),[allRows]);
  const bankBalance=useMemo(()=>carryover+allRows.reduce((s,r)=>r.type==="income"?s+r.amount:s,0)-cashExpense,[carryover,allRows,cashExpense]);
  const totExpense=useMemo(()=>allRows.reduce((s,r)=>r.type==="expense"?s+r.amount:s,0),[allRows]);

  const allCards=useMemo(()=>[...CARDS,...(store?.customCards||[]).map(c=>c.name).filter(Boolean)],[store]);
  const cardTotals=useMemo(()=>{
    const t={};allCards.forEach((c)=>{t[c]=0;});
    manualRows.forEach((e)=>{if(e.type==="expense"&&allCards.includes(e.payMethod)) t[e.payMethod]+=(Number(e.amount)||0);});
    return t;
  },[manualRows,allCards]);

  const addEntry=()=>{
    const amt=Number(newEnt.amount)||0;if(!newEnt.date||amt===0) return;
    upd((p)=>({...p,ledger:[...p.ledger,{id:uid(),date:newEnt.date,type:newEnt.type,desc:newEnt.desc,amount:amt,payMethod:newEnt.payMethod}]}));
    setNewEnt({...newEnt,desc:"",amount:""});
  };
  const setCarryover=(v)=>{
    const amt=Number(v)||0;
    upd((p)=>{const ex=p.ledger.find((e)=>e.date?.startsWith(monthStr)&&e.type==="carryover");
      const ledger=ex?p.ledger.map((e)=>e.id===ex.id?{...e,amount:amt}:e):[...p.ledger,{id:uid(),date:ymd(year,month,1),type:"carryover",desc:"전월이월",amount:amt,payMethod:"자동"}];
      return {...p,ledger};});
  };
  const delEntry=(id)=>upd((p)=>({...p,ledger:p.ledger.filter((e)=>e.id!==id)}));

  // 대출
  const addLoan=()=>upd((p)=>({...p,loans:[...p.loans,{id:uid(),title:"새 대출 건",creditor:"",debtor:"",principal:0,memo:"",installments:[]}]}));
  const updLoan=(id,f,v)=>upd((p)=>({...p,loans:p.loans.map((l)=>l.id===id?{...l,[f]:v}:l)}));
  const delLoan=(id)=>upd((p)=>({...p,loans:p.loans.filter((l)=>l.id!==id)}));
  const addInst=(lid)=>upd((p)=>({...p,loans:p.loans.map((l)=>l.id===lid?{...l,installments:[...l.installments,{id:uid(),seq:l.installments.length+1,amount:0,paid:false,memo:""}]}:l)}));
  const updInst=(lid,iid,f,v)=>upd((p)=>({...p,loans:p.loans.map((l)=>l.id===lid?{...l,installments:l.installments.map((i)=>i.id===iid?{...i,[f]:v}:i)}:l)}));

              <thead><tr><th>노선</th><th style={{width:70,textAlign:"center"}}>횟수</th><th style={{width:130}}>스위스 매출 단가</th><th style={{width:110,textAlign:"right"}}>합계</th></tr></thead>
              <tbody>

                <tbody>
                  {(store.customPriceRoutes||[]).filter(cr=>cr.name).map((cr)=>{

                      </tr>

            const rows=manualRows.filter((e)=>e.type==="expense"&&e.payMethod===card);

            const payDay=(store.cardPayDays||{})[card]||25;

            const payDate=`${ny}-${String(nm).padStart(2,"0")}-${String(actualDay).padStart(2,"0")}`;
            return (
              <div key={card} style={S.cardBlock}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

      {/* 지출입 장부 */}

        <div style={S.panel}>

            <span style={{fontSize:13,color:"#9aa3b5"}}>전월 이월금액</span>

            <tbody>
              {allRows.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"#7a8295",padding:"14px 0"}}>기록 없음</td></tr>}

            <select style={S.ef} value={newEnt.type} onChange={(e)=>setNewEnt({...newEnt,type:e.target.value})}>
              <option value="income">수입</option>
              <option value="expense">지출</option>
            </select>
            {newEnt.type==="expense"&&(
              <select style={S.ef} value={newEnt.payMethod} onChange={(e)=>setNewEnt({...newEnt,payMethod:e.target.value})}>
                {[...PAY_METHODS,...(store.customCards||[]).map(c=>c.name).filter(Boolean)].map((m)=><option key={m} value={m}>{m}</option>)}
              </select>
            )}
            <input style={{...S.ef,flex:1,minWidth:90}} type="text" placeholder="적요 (한/영키로 한글전환)" lang="ko" value={newEnt.desc} onChange={(e)=>setNewEnt({...newEnt,desc:e.target.value})}/>
            <input style={{...S.ef,width:100}} type="number" placeholder="금액" value={newEnt.amount} onChange={(e)=>setNewEnt({...newEnt,amount:e.target.value})}/>
            <button style={S.addBtn} onClick={addEntry}>추가</button>
          </div>

          {/* 요약 */}
          <div style={S.summary}>
            <div style={{...S.sRow,fontWeight:700,fontSize:14,borderBottom:"2px solid #c8d4e8",paddingBottom:8,marginBottom:4}}>
              <span>이월 잔액</span><span>{fmt(carryover)}원</span>
            </div>
            {allRows.filter(r=>r.type==="income").map(r=>(
              <div key={r.id} style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"3px 0",color:"#1a6b3a"}}>
                <span style={{flex:1}}>{r.date.slice(5)} {r.desc.length>22?r.desc.slice(0,22)+"...":r.desc}</span>
                <span style={{fontWeight:600,marginLeft:8}}>+ {fmt(r.amount)}</span>
              </div>
            ))}
            {allRows.filter(r=>r.type==="expense"&&r.payMethod==="현금").map(r=>(
              <div key={r.id} style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"3px 0",color:"#b03030"}}>
                <span style={{flex:1}}>{r.date.slice(5)} {r.desc.length>22?r.desc.slice(0,22)+"...":r.desc}</span>
                <span style={{fontWeight:600,marginLeft:8}}>- {fmt(r.amount)}</span>
              </div>
            ))}
            <div style={{...S.sRow,marginTop:8,fontSize:13,color:"#1a2535"}}>
              <span>이월잔액 - 현금지출</span>
              <span style={{color:(carryover-cashExpense)>=0?"#1a5c30":"#9b1c1c",fontWeight:600}}>{fmt(carryover-cashExpense)}원</span>
            </div>
            <div style={{...S.sRow,...S.sFinal,marginTop:4}}>
              <span>통장 잔액 (수입 포함)</span>
              <span style={{color:bankBalance>=0?"#1a5c30":"#9b1c1c"}}>{fmt(bankBalance)}원</span>
            </div>
            {/* 현금 지출 합계 */}
            {allRows.filter(r=>r.type==="expense"&&r.payMethod==="현금").length>0&&(
              <div style={{marginTop:8,padding:"8px 0",borderTop:"1px solid #d0d8e8"}}>
                <div style={{fontSize:12.5,fontWeight:700,color:"#1a2535",marginBottom:4}}>현금 지출 합계</div>
                {allRows.filter(r=>r.type==="expense"&&r.payMethod==="현금").map(r=>(
                  <div key={r.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"2px 0",color:"#b03030"}}>
                    <span>{r.date.slice(5)} {r.desc.length>20?r.desc.slice(0,20)+"...":r.desc}</span>
                    <span style={{fontWeight:600}}>- {fmt(r.amount)}</span>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,fontWeight:700,color:"#b03030",marginTop:4,paddingTop:4,borderTop:"1px dashed #d0d8e8"}}>

                  <span>- {fmt(cashExpense)}원</span>
                </div>
              </div>

            {/* 카드 지출 합계 */}

              <div style={{marginTop:8,padding:"8px 0",borderTop:"1px solid #d0d8e8"}}>
                <div style={{fontSize:12.5,fontWeight:700,color:"#1a2535",marginBottom:4}}>카드 지출 (통장 미차감)</div>
                {allRows.filter(r=>r.type==="expense"&&CARDS.includes(r.payMethod)).map(r=>(
                  <div key={r.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"2px 0",color:"#5a3a8a"}}>
                    <span>{r.date.slice(5)} [{r.payMethod}] {r.desc.length>18?r.desc.slice(0,18)+"...":r.desc}</span>
                    <span style={{fontWeight:600}}>{fmt(r.amount)}</span>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,fontWeight:700,color:"#5a3a8a",marginTop:4,paddingTop:4,borderTop:"1px dashed #d0d8e8"}}>
                  <span>카드 합계 ({nextMonth25} 결제)</span>
                  <span>{fmt(CARDS.reduce((s,c)=>s+(cardTotals[c]||0),0))}원</span>
                </div>
              </div>
            )}
            <div style={{fontSize:11,color:"#4a5568",marginTop:6}}>
              ※ 스위스 운행매출은 다음달 20일 입금 후 직접 기입
            </div>
          </div>
        </div>
      )}

      {/* 노선 통계 */}
      {tab==="stats"&&(
        <div style={S.panel}>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            <div style={S.statCard}><div style={S.sLbl2}>운행 기록일</div><div style={S.sVal}>{stats.workedDays}일</div></div>
            <div style={S.statCard}><div style={S.sLbl2}>노선 종류</div><div style={S.sVal}>{stats.counts.length}개</div></div>
          </div>
          {stats.counts.length===0?<div style={{color:"#7a8295",textAlign:"center",padding:"20px 0"}}>기록 없음</div>

              {stats.counts.map(([r,cnt])=>(
                <div key={r} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:90,fontSize:12.5,color:"#cfd4dc"}}>{r}</div>
                  <div style={{flex:1,height:12,background:"#1f2430",borderRadius:6,overflow:"hidden"}}>
                    <div style={{width:`${(cnt/(stats.counts[0][1]||1))*100}%`,height:"100%",background:ROUTE_COLORS[r]||"#5a6478",transition:"width .4s"}}/>
                  </div>
                  <div style={{width:24,textAlign:"right",fontSize:12.5,color:"#9aa3b5"}}>{cnt}</div>
                </div>
              ))}
            </div>
          }
        </div>
      )}

      {/* 노선 단가 */}
      {tab==="prices"&&(
        <div style={S.panel}>
          <div style={S.hint}>스위스공제 후 실수령액이 지출입 장부 수입으로 자동 반영됩니다. (외부·외대·공휴일은 별도 관리)</div>
          <table className="T">
            <thead><tr><th>노선</th><th style={{width:110}}>단가</th><th style={{width:110}}>스위스 공제</th><th style={{width:90}}>실수령</th></tr></thead>
            <tbody>
              {PRICED_ROUTES.map((r)=>{
                const p=store.prices[r]??0,d=store.deductions[r]??0;
                return (
                  <tr key={r}>
                    <td><span style={{color:ROUTE_COLORS[r]}}>●</span> {r}</td>
                    <td><input type="number" value={p} onChange={(e)=>upd((prev)=>({...prev,prices:{...prev.prices,[r]:Number(e.target.value)||0}}))}/></td>
                    <td><input type="number" value={d} onChange={(e)=>upd((prev)=>({...prev,deductions:{...prev.deductions,[r]:Number(e.target.value)||0}}))}/></td>
                    <td style={{color:"#9aa3b5"}}>{fmt(Math.max(0,p-d))}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {/* 추가 노선 단가 (드롭다운) */}
          <details style={{marginTop:14}}>
            <summary style={{cursor:"pointer",padding:"10px 14px",background:"#dde3ef",borderRadius:8,fontSize:13,fontWeight:600,color:"#1a2535",listStyle:"none",display:"flex",justifyContent:"space-between"}}>
              <span>▶ 추가 노선 단가 설정 ({typeof EXTRA_ROUTES!=="undefined"?EXTRA_ROUTES.length:0}개)</span>
              <span style={{fontSize:11,color:"#6b7585"}}>클릭하여 펼치기</span>
            </summary>
            <div style={{marginTop:8}}>
              <div style={{fontSize:11.5,color:"#6b7585",marginBottom:8}}>추가 노선별 단가를 입력하면 노선통계 및 스위스매출 합계에 자동 반영됩니다.</div>
              <table className="T">
                <thead><tr><th>노선</th><th style={{width:130}}>단가 (원)</th><th style={{width:130}}>스위스 공제 (원)</th><th style={{width:90}}>실수령</th></tr></thead>
                <tbody>
                  {(typeof EXTRA_ROUTES!=="undefined"?EXTRA_ROUTES:[]).map((r)=>{
                    const p=store.prices[r]??0;
                    const d=store.deductions[r]??0;
                    return (
                      <tr key={r}>
                        <td><span style={{color:EXTRA_COLOR}}>●</span> {r}</td>
                        <td><input type="number" value={p} onChange={(e)=>upd((prev)=>({...prev,prices:{...prev.prices,[r]:Number(e.target.value)||0}}))}/></td>
                        <td><input type="number" value={d} onChange={(e)=>upd((prev)=>({...prev,deductions:{...prev.deductions,[r]:Number(e.target.value)||0}}))}/></td>
                        <td style={{color:"#9aa3b5"}}>{fmt(Math.max(0,p-d))}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </details>

          {/* 사용자 노선 추가 */}
          <div style={{...S.settleBox,marginTop:14}}>
            <div style={S.settleTitle}>노선 직접 추가</div>
            <div style={{fontSize:11.5,color:"#6b7585",marginBottom:10}}>기본 목록에 없는 노선을 직접 추가해서 단가를 설정할 수 있습니다.</div>
            {(store.customPriceRoutes||[]).map((cr)=>(
              <div key={cr.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <input style={{...S.ti,flex:1.5}} type="text" lang="ko" value={cr.name} placeholder="노선명" onChange={(e)=>upd((p)=>({...p,customPriceRoutes:p.customPriceRoutes.map(x=>x.id===cr.id?{...x,name:e.target.value}:x)}))}/>
                <input style={{...S.ti,width:120}} type="number" value={cr.price} placeholder="단가" onChange={(e)=>upd((p)=>({...p,customPriceRoutes:p.customPriceRoutes.map(x=>x.id===cr.id?{...x,price:Number(e.target.value)||0}:x)}))}/>
                <input style={{...S.ti,width:120}} type="number" value={cr.deduction} placeholder="공제" onChange={(e)=>upd((p)=>({...p,customPriceRoutes:p.customPriceRoutes.map(x=>x.id===cr.id?{...x,deduction:Number(e.target.value)||0}:x)}))}/>
                <span style={{fontSize:12,color:"#6b7585",minWidth:70}}>{fmt(Math.max(0,(cr.price||0)-(cr.deduction||0)))}</span>
                <button style={S.rBtn} onClick={()=>upd((p)=>({...p,customPriceRoutes:p.customPriceRoutes.filter(x=>x.id!==cr.id)}))}>✕</button>
              </div>
            ))}
            <button style={S.addRowBtn} onClick={()=>upd((p)=>({...p,customPriceRoutes:[...(p.customPriceRoutes||[]),{id:uid(),name:"",price:0,deduction:0}]}))}>+ 노선 추가</button>
          </div>
        </div>
      )}

      
      
      {/* 대출 관리 */}
      {tab==="loans"&&(
        <div style={S.panel}>
          <div style={S.hint}>차량할부, 대출 등 상환 관리 탭입니다. 직접 추가해서 사용하세요.</div>
          {store.loans.map((loan)=>{
            const tot=loan.installments.reduce((s,i)=>s+(Number(i.amount)||0),0);
            const paid=loan.installments.filter((i)=>i.paid).reduce((s,i)=>s+(Number(i.amount)||0),0);
            return (
              <div key={loan.id} style={S.loanCard}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <input style={S.loanTitle} value={loan.title} onChange={(e)=>updLoan(loan.id,"title",e.target.value)}/>
                  <button style={S.rBtn} onClick={()=>delLoan(loan.id)}>✕</button>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:10}}>

                    <div key={f} style={{flex:1}}>
                      <div style={{fontSize:11,color:"#9aa3b5",marginBottom:3}}>{lbl}</div>
                      <input style={S.ti} type={f==="principal"?"number":"text"} value={loan[f]} onChange={(e)=>updLoan(loan.id,f,f==="principal"?Number(e.target.value)||0:e.target.value)}/>
                    </div>
                  ))}
                </div>
                <textarea style={S.loanMemo} value={loan.memo} onChange={(e)=>updLoan(loan.id,"memo",e.target.value)} placeholder="메모 (계약 내용, 담보, 기타)"/>
                <table className="T" style={{marginTop:8}}>
                  <thead><tr><th style={{width:36}}>회차</th><th>메모/예정일</th><th style={{width:110}}>금액</th><th style={{width:48}}>완납</th><th style={{width:28}}></th></tr></thead>
                  <tbody>
                    {loan.installments.map((inst)=>(
                      <tr key={inst.id}>
                        <td>{inst.seq}</td>
                        <td><input type="text" value={inst.memo} onChange={(e)=>updInst(loan.id,inst.id,"memo",e.target.value)}/></td>
                        <td><input type="number" value={inst.amount} onChange={(e)=>updInst(loan.id,inst.id,"amount",Number(e.target.value)||0)}/></td>
                        <td style={{textAlign:"center"}}><input type="checkbox" checked={inst.paid} onChange={(e)=>updInst(loan.id,inst.id,"paid",e.target.checked)}/></td>
                        <td><button style={S.rBtn} onClick={()=>delInst(loan.id,inst.id)}>✕</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <button style={S.addRowBtn} onClick={()=>addInst(loan.id)}>+ 회차 추가</button>
                <div style={{display:"flex",gap:16,marginTop:10,fontSize:12.5,flexWrap:"wrap"}}>
                  <span>합계: <b>{fmt(tot)}원</b></span>
                  <span>완납: <b style={{color:"#1a6b3a"}}>{fmt(paid)}원</b></span>
                  <span>미납: <b style={{color:"#b03030"}}>{fmt(tot-paid)}원</b></span>
                </div>
              </div>
            );
          })}
          <button style={S.addRowBtn} onClick={addLoan}>+ 대출/할부 추가</button>
        </div>
      )}

      {/* 달력 모달 */}
      {sel&&(
        <div style={S.overlay} onClick={closeDay}>
          <div style={S.modal} onClick={(e)=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:15,fontWeight:700}}>{sel} 일정</div>
              <button style={{background:"transparent",border:"none",color:"#8a93a6",fontSize:16,cursor:"pointer"}} onClick={closeDay}>✕</button>
            </div>
            <div style={S.sLbl}>출근 / 퇴근</div>
            <div style={{display:"flex",gap:10}}>
              {[["출근",dIn,setDIn],["퇴근",dOut,setDOut]].map(([lbl,val,set])=>(
                <div key={lbl} style={{flex:1}}><div style={{fontSize:11,color:"#9aa3b5",marginBottom:3}}>{lbl}</div><input style={S.ti} type="time" value={val} onChange={(e)=>set(e.target.value)}/></div>
              ))}
            </div>
            <div style={S.sLbl}>주유비 (이 날 주유 금액)</div>
            <input style={S.ti} type="number" value={dFuel} onChange={(e)=>setDFuel(e.target.value)} placeholder="예: 562081"/>
            {[["오전 노선 (출근)",dAm,setDAm,cAm,setCAm,"am"],["오후 노선 (퇴근)",dPm,setDPm,cPm,setCPm,"pm"]].map(([lbl,draft,setDraft,cv,setCv,period])=>(
              <div key={period}>
                <div style={S.sLbl}>{lbl}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {ROUTES.filter(r=>r!=="외부"&&r!=="공휴일").map((r)=>{const on=draft.includes(r);return <button key={r} className="ptag" style={{...S.pickTag,background:on?(ROUTE_COLORS[r]||"#555"):"#262c39",borderColor:on?(ROUTE_COLORS[r]||"#555"):"#3a4254",color:on?"#fff":"#aab2c0"}} onClick={()=>toggleR(period,r)}>{r}</button>;})}
                </div>
                <details style={{marginTop:5}}>
                  <summary style={{cursor:"pointer",padding:"5px 8px",background:"#dde3ef",borderRadius:6,fontSize:12,color:"#3b6e8f",listStyle:"none",userSelect:"none"}}>▶ 추가 노선 선택 (35개)</summary>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5,maxHeight:130,overflowY:"auto",padding:4,background:"#f5f7fc",borderRadius:6,border:"1px solid #dde3ef"}}>
                    {EXTRA_ROUTES.map((r)=>{
                      const on=draft.includes(r);
                      return <button key={r} className="ptag" style={{border:"1px solid",borderRadius:5,padding:"3px 7px",fontSize:11,cursor:"pointer",background:on?"#5a7a9e":"#fff",borderColor:on?"#5a7a9e":"#c8d0e0",color:on?"#fff":"#2a3348"}} onClick={()=>toggleR(period,r)}>{r}</button>;
                    })}
                    {(store.customPriceRoutes||[]).filter(cr=>cr.name).map((cr)=>{
                      const on=draft.includes(cr.name);
                      return <button key={cr.id} className="ptag" style={{border:"1px solid",borderRadius:5,padding:"3px 7px",fontSize:11,cursor:"pointer",background:on?"#e67e22":"#fff",borderColor:on?"#e67e22":"#c8d0e0",color:on?"#fff":"#2a3348"}} onClick={()=>toggleR(period,cr.name)}>{cr.name}</button>;
                    })}
                  </div>
                </details>
                <div style={{display:"flex",gap:6,marginTop:5}}>
                  <input style={{...S.ti,flex:1}} value={cv} onChange={(e)=>setCv(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&addC(period)} lang="ko" placeholder="직접 입력"/>

                </div>
                <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:80,overflowY:"auto",marginTop:4}}>
                  {draft.length===0&&<div style={{fontSize:11.5,color:"#5e6678"}}>일정 없음</div>}
                  {draft.map((item,idx)=>(
                    <div key={idx} style={{display:"flex",alignItems:"center",gap:7,background:"#171b24",border:"1px solid #262c39",borderRadius:7,padding:"4px 9px"}}>
                      <span style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:ROUTE_COLORS[item]||"#888"}}/>
                      <span style={{fontSize:12.5,flex:1}}>{item}</span>
                      <button style={S.rBtn} onClick={()=>setDraft((p)=>p.filter((_,i)=>i!==idx))}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:18}}>
              <button style={S.clearBtn} onClick={clearDay}>비우기</button>
              <button style={S.saveBtn} onClick={saveDay}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
